<nav aria-label="breadcrumb">
  <ol class="breadcrumb">
    @for (crumb of breadcrumbs$ | async; track crumb.url; let last = $last) {
      <li class="breadcrumb-item" [class.active]="last">
        @if (!last) {
          <a [routerLink]="crumb.url">{{ crumb.label }}</a>
        } @else {
          <span>{{ crumb.label }}</span>
        }
      </li>
    }
  </ol>
</nav>
